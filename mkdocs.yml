site_name: PrintForHelp Documentation
site_description: Coordination platform for community-driven 3D-printed humanitarian aid

repo_name: jcarranz97/printforhelp
repo_url: https://github.com/jcarranz97/printforhelp

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - toc.integrate
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Roadmap: roadmap.md
  - Requirements: requirements.md
  - Architecture:
    - Backend: architecture/backend.md
    - Database: architecture/database-schema.md
    - API: architecture/api-specification.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - footnotes
  - attr_list
  - md_in_html
  - tables

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10.6.1/dist/mermaid.min.js
