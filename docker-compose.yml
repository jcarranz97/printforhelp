version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: printforhelp-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      # Named volume for uploaded media so files survive rebuilds and are
      # not written into the bind-mounted source tree.
      - media_data:/app/media
    environment:
      DATABASE_URL: postgresql://printforhelp_user:printforhelp_password@postgres:5432/printforhelp_db
      PYTHONPATH: /app
      SECRET_KEY: local-dev-secret-change-me-in-production-0123456789
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: printforhelp-admin
      # Local-only: seed a maintainer + a regular user on startup.
      SEED_DEV_DATA: "true"
      # Image uploads: store on disk. MEDIA_BASE_URL is left empty so stored
      # URLs are relative (/media/...); the frontend proxies /media to the
      # backend (next.config rewrites), so they work on any origin.
      MEDIA_ROOT: /app/media
      MEDIA_BASE_URL: ""
    # Apply migrations before serving; admin bootstrap + dev seeding run
    # in the app lifespan on startup.
    command: >-
      sh -c "uv run alembic upgrade head &&
      uv run fastapi dev --host 0.0.0.0 --port 8000"
    ports:
      - "8100:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: printforhelp-postgres
    environment:
      POSTGRES_DB: printforhelp_db
      POSTGRES_USER: printforhelp_user
      POSTGRES_PASSWORD: printforhelp_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printforhelp_user -d printforhelp_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: printforhelp-frontend
    environment:
      # Browser-facing API base (used by any client-side fetch).
      NEXT_PUBLIC_API_URL: http://localhost:8100/api/v1
      # Server-to-server base used by Next.js server actions inside the
      # Docker network (the frontend container reaching the backend).
      API_URL_INTERNAL: http://backend:8000/api/v1
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

  docs:
    image: squidfunk/mkdocs-material:latest
    container_name: printforhelp-docs
    volumes:
      - ./docs:/docs/docs
      - ./mkdocs.yml:/docs/mkdocs.yml
    ports:
      - "2012:2012"
    command: serve --dev-addr=0.0.0.0:2012
    restart: unless-stopped

volumes:
  postgres_data:
  media_data:
